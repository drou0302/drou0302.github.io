backend:
  name: github
  repo: drou0302/drou0302.github.io
  branch: main
  base_url: https://decap-oauth.drou0302.workers.dev

media_folder: public/images
public_folder: /images

collections:

  # ── About ──────────────────────────────────────────────────────────────────
  - name: about
    label: About
    files:
      - label: About page
        name: about
        file: src/content/about/index.md
        fields:
          - { label: Intro, name: intro, widget: text, hint: "Short intro shown at the top of the About page." }
          - { label: Background, name: background, widget: text, hint: "Your scientific background." }
          - { label: Current work, name: current_work, widget: text, hint: "What you're building at inseit." }
          - { label: Location, name: location, widget: string }
          - { label: Affiliation, name: affiliation, widget: string, required: false }
          - label: Network nodes
            name: network_nodes
            widget: list
            hint: "Labels shown on the homepage particle network when hovered."
            field: { label: Node label, name: node, widget: string }

  # ── CV ─────────────────────────────────────────────────────────────────────
  - name: cv
    label: CV
    files:
      - label: CV
        name: cv
        file: src/content/cv/index.json
        extension: json
        format: json
        fields:
          - label: Positions
            name: positions
            widget: list
            fields:
              - { label: Role, name: role, widget: string }
              - { label: Organisation, name: org, widget: string }
              - { label: Organisation URL, name: org_url, widget: string, required: false }
              - { label: Location, name: location, widget: string }
              - { label: Start year, name: start, widget: string }
              - { label: End year, name: end, widget: string }
              - { label: Description, name: description, widget: text, required: false }
          - label: Education
            name: education
            widget: list
            fields:
              - { label: Degree, name: degree, widget: string }
              - { label: Field, name: field, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Location, name: location, widget: string }
              - { label: Start year, name: start, widget: string }
              - { label: End year, name: end, widget: string }
          - label: Teaching
            name: teaching
            widget: list
            required: false
            fields:
              - { label: Course / Topic, name: course, widget: string }
              - label: Role
                name: role
                widget: select
                options: [Lecturer, Teaching assistant, Supervisor, Guest lecturer]
              - { label: Institution, name: institution, widget: string }
              - label: Level
                name: level
                widget: select
                required: false
                options: [BSc, MSc, PhD, Postgraduate, Professional]
              - { label: Start year, name: start, widget: string }
              - { label: End year, name: end, widget: string }
              - { label: Description, name: description, widget: text, required: false }
          - label: Publications
            name: publications
            widget: list
            required: false
            fields:
              - { label: Authors, name: authors, widget: string }
              - label: Role
                name: role
                widget: select
                options: [first, co-first, corresponding, co-corresponding, contributing]
                required: false
              - { label: Title, name: title, widget: string }
              - { label: Journal, name: journal, widget: string }
              - { label: Year, name: year, widget: number, value_type: int }
              - { label: DOI, name: doi, widget: string, required: false }
              - label: Protein structures
                name: pdb_ids
                widget: list
                required: false
                hint: "Structures featured in this paper — links to the 3D viewer on the Research page."
                field:
                  label: Structure
                  name: pdb_id
                  widget: select
                  options: [AlaDH, AtPAL2, BmGDH, BsADH, CgKR, GcIRED, HRP, HeFDH, HeP5C, HeWT, LbTDC, Papain, TsRTA]
          - label: Presentations
            name: presentations
            widget: list
            required: false
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Venue / Conference, name: venue, widget: string }
              - { label: Location, name: location, widget: string, required: false }
              - { label: Year, name: year, widget: number, value_type: int }
              - label: Type
                name: type
                widget: select
                options: [talk, poster, invited]
          - label: Prizes & Awards
            name: prizes
            widget: list
            required: false
            fields:
              - { label: Prize / Award title, name: title, widget: string }
              - { label: Awarded by, name: awarded_by, widget: string }
              - { label: Year, name: year, widget: number, value_type: int }
              - { label: Description, name: description, widget: text, required: false }
              - { label: "Highlight (show by default)", name: highlight, widget: boolean, default: false, required: false, hint: "Highlighted entries are shown without expanding the list." }
          - label: Grants & Funding
            name: funding
            widget: list
            required: false
            fields:
              - { label: Grant / Project title, name: title, widget: string }
              - { label: Funder, name: funder, widget: string }
              - { label: Amount, name: amount, widget: string, required: false, hint: "e.g. CHF 150,000" }
              - { label: Start year, name: start, widget: string }
              - { label: End year, name: end, widget: string }
              - label: Role
                name: role
                widget: select
                required: false
                options: [Main applicant, Co-applicant, Participant]
              - { label: "Highlight (show by default)", name: highlight, widget: boolean, default: false, required: false, hint: "Highlighted entries are shown without expanding the list." }
          - label: Skills
            name: skills
            widget: list
            field: { label: Skill, name: skill, widget: string }

  # ── Blog Posts ─────────────────────────────────────────────────────────────
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: Category
        name: category
        widget: select
        options: [science, startup, personal]
      - { label: Description, name: description, widget: string, hint: "Short summary shown in listings." }
      - { label: Cover image, name: image, widget: image, required: false, hint: "Optional photo shown at the top of the post." }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  # ── Projects ───────────────────────────────────────────────────────────────
  - name: projects
    label: Projects
    folder: src/content/projects
    create: true
    delete: true
    extension: json
    format: json
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - label: Type
        name: type
        widget: select
        options: [research, startup, personal, hobby, education]
      - label: Status
        name: status
        widget: select
        options: [active, completed, paused]
      - { label: Link, name: link, widget: string, required: false }
      - { label: Year, name: year, widget: number, required: false, value_type: int }
