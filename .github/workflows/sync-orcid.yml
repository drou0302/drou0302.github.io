name: Sync publications from ORCID

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Run ORCID sync
        run: node scripts/sync-orcid.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/cv/index.json
          if git diff --staged --quiet; then
            echo "No new publications."
          else
            git commit -m "chore: sync publications from ORCID"
            git push
          fi
